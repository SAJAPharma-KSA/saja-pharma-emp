<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

// ══════════════════════════════════════════════════
//  ⚙️  إعدادات EmailJS  – فعّل الإشعارات هنا
// ══════════════════════════════════════════════════
//  1. سجّل مجاناً على https://www.emailjs.com
//  2. أنشئ Service (Gmail / Outlook / ...) واحفظ Service ID
//  3. أنشئ Template بالمتغيرات التالية في نص الرسالة:
//       {{employee_name}}  {{license_type}}  {{department}}
//       {{expiry_date}}    {{days_remaining}}  {{to_email}}
//  4. انسخ Public Key من Account > General
// ══════════════════════════════════════════════════
const EJ_SERVICE  = "YOUR_SERVICE_ID";   // ← ضع Service ID
const EJ_TEMPLATE = "YOUR_TEMPLATE_ID";  // ← ضع Template ID
const EJ_PUBKEY   = "YOUR_PUBLIC_KEY";   // ← ضع Public Key
const WARN_DAYS   = 60;                   // إشعار قبل الانتهاء بـ 60 يوم
// ══════════════════════════════════════════════════

/* ──────────────── Utility helpers ──────────────── */
function getStatus(expiry) {
  if (!expiry) return { key:"expired", label:"بدون تاريخ", days:-999 };
  try {
    const now = new Date(); now.setHours(0,0,0,0);
    const exp = new Date(expiry); exp.setHours(0,0,0,0);
    if (isNaN(exp.getTime())) return { key:"expired", label:"تاريخ غير صحيح", days:-999 };
    const diff = Math.ceil((exp - now) / 86400000);
    if (diff < 0)          return { key:"expired", label:"منتهية",        days:diff };
    if (diff <= WARN_DAYS) return { key:"soon",    label:"قريبة الانتهاء", days:diff };
    return                        { key:"valid",   label:"صالحة",          days:diff };
  } catch { return { key:"expired", label:"خطأ", days:-999 }; }
}

function getProgress(expiry) {
  if (!expiry) return 0;
  try {
    const now = new Date(); now.setHours(0,0,0,0);
    const exp = new Date(expiry); exp.setHours(0,0,0,0);
    if (isNaN(exp.getTime())) return 0;
    const diff = Math.ceil((exp - now) / 86400000);
    if (diff <= 0) return 0;
    return Math.min(100, Math.round((diff / 365) * 100));
  } catch { return 0; }
}

function formatDate(d) {
  if (!d) return "—";
  try {
    const [y, m, day] = d.split("-");
    const mo = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
    return `${parseInt(day)} ${mo[parseInt(m)-1]} ${y}`;
  } catch { return d; }
}

function getInitials(name) {
  if (!name || !name.trim()) return "؟";
  const parts = name.trim().split(/\s+/).filter(Boolean);
  return parts.length >= 2 ? parts[0][0] + parts[1][0] : parts[0].slice(0, 2);
}

function todayStr() { return new Date().toISOString().split("T")[0]; }

/* ──────────────── Firebase helpers ──────────────── */
async function fbAdd(data) {
  const { db, collection, addDoc } = window.__firebase;
  const ref = await addDoc(collection(db, "employees"), data);
  return ref.id;
}
async function fbUpdate(id, data) {
  const { db, doc, updateDoc } = window.__firebase;
  await updateDoc(doc(db, "employees", id), data);
}
async function fbDelete(id) {
  const { db, doc, deleteDoc } = window.__firebase;
  await deleteDoc(doc(db, "employees", id));
}
function fbListen(onData, onErr) {
  const { db, collection, onSnapshot } = window.__firebase;
  return onSnapshot(
    collection(db, "employees"),
    snap => onData(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
    err => onErr && onErr(err)
  );
}
async function fbSignIn(email, pass) {
  const { auth, signInWithEmailAndPassword } = window.__firebase;
  return signInWithEmailAndPassword(auth, email, pass);
}
async function fbSignOut() {
  const { auth, signOut } = window.__firebase;
  return signOut(auth);
}
function fbAuthListen(cb) {
  const { auth, onAuthStateChanged } = window.__firebase;
  return onAuthStateChanged(auth, cb);
}
async function fbIsNotified(empId) {
  const { db, doc, getDoc } = window.__firebase;
  try {
    const snap = await getDoc(doc(db, "notifications", `${empId}_${todayStr()}`));
    return snap.exists();
  } catch { return false; }
}
async function fbMarkNotified(empId) {
  const { db, doc, setDoc } = window.__firebase;
  await setDoc(doc(db, "notifications", `${empId}_${todayStr()}`), { date: todayStr() });
}

/* ──────────────── EmailJS notification ──────────────── */
async function sendEmail(emp) {
  if (EJ_PUBKEY === "YOUR_PUBLIC_KEY" || !emp.notifyEmail) return false;
  const st = getStatus(emp.expiry);
  try {
    emailjs.init(EJ_PUBKEY);
    await emailjs.send(EJ_SERVICE, EJ_TEMPLATE, {
      to_email:       emp.notifyEmail,
      employee_name:  emp.name,
      license_type:   emp.licenseType || "—",
      department:     emp.department  || "—",
      expiry_date:    formatDate(emp.expiry),
      days_remaining: st.days >= 0 ? `${st.days} يوم` : "منتهية",
    });
    return true;
  } catch(e) { console.warn("EmailJS:", e); return false; }
}

async function runNotifications(employees) {
  if (EJ_PUBKEY === "YOUR_PUBLIC_KEY") return 0;
  let sent = 0;
  for (const emp of employees) {
    const st = getStatus(emp.expiry);
    if ((st.key === "soon" || st.key === "expired") && emp.notifyEmail) {
      const already = await fbIsNotified(emp.id).catch(() => false);
      if (!already) {
        const ok = await sendEmail(emp);
        if (ok) { await fbMarkNotified(emp.id).catch(()=>{}); sent++; }
      }
    }
  }
  return sent;
}

const EMPTY_FORM = { name:"", idNumber:"", empId:"", department:"", licenseType:"", expiry:"", notifyEmail:"" };

function EmployeeModal({ onClose, onSave, initial, saving }) {
  const [form,   setForm]   = useState(initial ? { ...EMPTY_FORM, ...initial } : { ...EMPTY_FORM });
  const [errors, setErrors] = useState({});

  const set = useCallback((k, v) => {
    setForm(f => ({...f, [k]: v}));
    setErrors(er => ({...er, [k]: ""}));
  }, []);

  const validate = () => {
    const e = {};
    if (!form.name.trim())         e.name        = "الاسم الكامل مطلوب";
    if (!form.idNumber.trim())     e.idNumber    = "رقم الهوية مطلوب";
    else if (!/^\d{10}$/.test(form.idNumber.trim())) e.idNumber = "يجب أن يكون رقم هوية مكوّنًا من 10 أرقام";
    if (!form.empId.trim())        e.empId       = "الرقم الوظيفي مطلوب";
    if (!form.department.trim())   e.department  = "اسم القسم مطلوب";
    if (!form.licenseType.trim())  e.licenseType = "نوع الترخيص مطلوب";
    if (!form.expiry)              e.expiry      = "تاريخ الانتهاء مطلوب";
    if (form.notifyEmail && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.notifyEmail))
      e.notifyEmail = "صيغة البريد الإلكتروني غير صحيحة";
    return e;
  };

  const handleSubmit = () => {
    const e = validate();
    if (Object.keys(e).length > 0) { setErrors(e); return; }
    onSave(form);
  };

  const F = ({ field, label, required, ...props }) => (
    <div className="form-group">
      <label className="form-label">{label}{required && <span className="req"> *</span>}</label>
      <input className={`form-input${errors[field]?" err":""}`}
        value={form[field]} onChange={e => set(field, e.target.value)} {...props}/>
      {errors[field]
        ? <div className="form-error">⚠ {errors[field]}</div>
        : props.hint && <div className="form-hint">{props.hint}</div>}
    </div>
  );

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&!saving&&onClose()}>
      <div className="modal">
        <div className="modal-title">
          <span style={{fontSize:22}}>💊</span>
          {initial ? "تعديل بيانات الموظف" : "إضافة موظف جديد"}
        </div>

        {/* Personal */}
        <F field="name" label="الاسم الكامل" required placeholder="أدخل اسم الموظف الكامل"/>
        <div className="form-row">
          <div className="form-group">
            <label className="form-label">رقم الهوية<span className="req"> *</span></label>
            <input
              className={`form-input${errors.idNumber?" err":""}`}
              placeholder="10 أرقام" value={form.idNumber}
              onChange={e => set("idNumber", e.target.value.replace(/\D/g,"").slice(0,10))}/>
            {errors.idNumber
              ? <div className="form-error">⚠ {errors.idNumber}</div>
              : <div className="form-hint">{form.idNumber.length}/10</div>}
          </div>
          <F field="empId" label="الرقم الوظيفي" required placeholder="مثال: PH-007"/>
        </div>

        {/* License */}
        <div className="form-section">
          <div className="form-section-title">معلومات الترخيص</div>
          <div className="form-row">
            <F field="department"  label="القسم"        required placeholder="مثال: الصيدلة السريرية"/>
            <F field="licenseType" label="نوع الترخيص"  required placeholder="مثال: رخصة صيدلاني"/>
          </div>
          <F field="expiry" label="تاريخ انتهاء الترخيص" required type="date"/>
        </div>

        {/* Notification */}
        <div className="form-section">
          <div className="form-section-title">إشعار البريد الإلكتروني</div>
          <F field="notifyEmail" label="البريد الإلكتروني للإشعار"
            type="email" placeholder="example@email.com  (اختياري)"
            hint={`سيُرسل تلقائيًا قبل انتهاء الترخيص بـ ${WARN_DAYS} يومًا`}/>
        </div>

        <div className="modal-actions">
          <button className="btn btn-primary" style={{flex:1,justifyContent:"center"}}
            disabled={saving} onClick={handleSubmit}>
            {saving ? "⏳ جاري الحفظ..." : initial ? "💾 حفظ التعديلات" : "➕ إضافة الموظف"}
          </button>
          <button className="btn btn-ghost" onClick={onClose} disabled={saving}>إلغاء</button>
        </div>
      </div>
    </div>
  );
}

    setLoading(true);

  const departments = useMemo(() =>
    [...new Set(employees.map(e => e.department).filter(Boolean))].sort()

      || (e.licenseType||"").toLowerCase().includes(q);
    const matchStatus = filter === "all" || getStatus(e.expiry).key === filter;

      <div className="loading-spinner"/>

          <div>

        </div>
      </header>

      <main className="main">
        {/* Warning Banner */}
        {(stats.soon > 0 || stats.expired > 0) && (
          <div className="notif-banner">
            ⚠️ يوجد <strong>{stats.soon + stats.expired}</strong> ترخيص يحتاج انتباهك
            &nbsp;({stats.expired > 0 && <span>{stats.expired} منتهٍ </span>}
            {stats.soon > 0 && <span>{stats.soon} قريب الانتهاء</span>})
          </div>
        )}

        {/* Stats */}
        <div className="stats-grid">
          <StatCard icon="👥" value={stats.total}   label="إجمالي الموظفين"     color="blue"/>
          <StatCard icon="✅" value={stats.valid}   label="تراخيص صالحة"        color="green"/>
          <StatCard icon="⚠️" value={stats.soon}   label="قريبة الانتهاء"      color="orange"/>
          <StatCard icon="❌" value={stats.expired} label="تراخيص منتهية"       color="red"/>
        </div>

        {/* Toolbar */}
        <div className="toolbar">
          <div className="search-wrap">
            <span className="search-icon">🔍</span>
            <input placeholder="بحث بالاسم، رقم الهوية، القسم، نوع الترخيص..."
              value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          {departments.length > 0 && (
            <select className="dept-select" value={deptFilter} onChange={e=>setDeptFilter(e.target.value)}>
              <option value="all">🏢 جميع الأقسام</option>
              {departments.map(d => <option key={d} value={d}>{d}</option>)}
            </select>
          )}
          <div className="view-toggle">
            <button className={`view-btn${view==="table"?" active":""}`} onClick={()=>setView("table")} title="جدول">☰</button>
            <button className={`view-btn${view==="grid" ?" active":""}`} onClick={()=>setView("grid")}  title="بطاقات">⊞</button>
          </div>
        </div>

        {/* Filter Tabs */}
        <div className="filter-tabs">
          {filterTabs.map(t => (
            <button key={t.key}
              className={`filter-tab ${filter===t.key ? t.active : ""}`}
              onClick={()=>setFilter(t.key)}>{t.label}</button>
          ))}
        </div>

        {/* Content */}
        {filtered.length === 0 ? (
          <div className="empty-state">
            <div className="empty-icon">{employees.length===0 ? "💊" : "🔍"}</div>
            <div className="empty-text">{employees.length===0 ? "لا يوجد موظفون بعد" : "لا توجد نتائج"}</div>
            <div className="empty-sub">{employees.length===0 ? "اضغط إضافة موظف للبدء" : "جرب تغيير كلمة البحث أو الفلتر"}</div>
          </div>
        ) : view === "table" ? (
          <div className="table-wrap" style={{overflowX:"auto"}}>
            <table>
              <thead>
                <tr>
                  <th>الموظف</th>
                  <th>رقم الهوية</th>
                  <th>القسم</th>
                  <th>نوع الترخيص</th>
                  <th>تاريخ الانتهاء</th>
                  <th>الحالة</th>
                  <th>المدة المتبقية</th>
                  <th>إجراءات</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(e =>
                  <TableRow key={e.id} emp={e} onEdit={setModal} onDelete={setDeleteTarget}/>
                )}
              </tbody>
            </table>
          </div>
        ) : (
          <div className="grid-view">
            {filtered.map(e =>
              <EmployeeCard key={e.id} emp={e} onEdit={setModal} onDelete={setDeleteTarget}/>
            )}
          </div>
        )}
      </main>

      {/* Add / Edit Modal */}
      {(modal === "add" || (modal && modal.id)) && (
        <EmployeeModal
          onClose={()=>!saving&&setModal(null)}
          onSave={handleSave}
          initial={modal !== "add" ? modal : null}
          saving={saving}/>
      )}

      {/* Delete Confirm Modal */}
      {deleteTarget && (
        <ConfirmDeleteModal
          name={deleteTarget.name}
          onConfirm={handleDeleteConfirm}
          onCancel={()=>setDeleteTarget(null)}/>
      )}

      {/* Toast */}
      {toast && <Toast msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   ROOT – handles Firebase init + Auth state
═══════════════════════════════════════════════════════ */
function Root() {
  const [fbReady,     setFbReady]     = useState(!!window.__firebase);
  const [user,        setUser]        = useState(null);
  const [authLoading, setAuthLoading] = useState(true);

  useEffect(() => {
    if (fbReady) return;
    const h = () => setFbReady(true);
    window.addEventListener("firebase-ready", h);
    return () => window.removeEventListener("firebase-ready", h);
  }, [fbReady]);

  useEffect(() => {
    if (!fbReady) return;
    const unsub = fbAuthListen(u => { setUser(u); setAuthLoading(false); });
    return () => unsub();
  }, [fbReady]);

  if (!fbReady || authLoading) return (
    <div className="loading-center">
      <div className="loading-spinner"/>
      <div style={{fontSize:14}}>جاري تهيئة النظام...</div>
    </div>
  );

  return user ? <App user={user}/> : <LoginPage/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
