<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>سجل متابعة موظفين ساجا الصيادلة</title>
<link href="https://fonts.googleapis.com/css2?family=Sakkal+Majalla:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --primary: #1a5fa8;
    --primary-light: #e8f0fb;
    --accent: #0e9e6e;
    --danger: #e53e3e;
    --warn: #d97706;
    --warn-light: #fffbeb;
    --danger-light: #fff5f5;
    --green-light: #f0fdf4;
    --border: #e2e8f0;
    --text: #1e293b;
    --muted: #64748b;
    --white: #ffffff;
    --shadow: 0 2px 12px rgba(26,95,168,0.08);
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sakkal Majalla', 'Arial', sans-serif;
    background: #f8fafc;
    color: var(--text);
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  .header {
    background: var(--white);
    border-bottom: 3px solid var(--primary);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 80px;
    box-shadow: 0 2px 16px rgba(26,95,168,0.08);
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo-circle {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--primary), #3b82f6);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: white; font-weight: 700;
    box-shadow: 0 4px 14px rgba(26,95,168,0.3);
    flex-shrink: 0;
  }
  .logo-text-ar {
    font-size: 20px; font-weight: 700; color: var(--primary); line-height: 1.3;
  }
  .logo-text-en {
    font-size: 12px; color: var(--muted); letter-spacing: 0.5px;
  }
  .header-controls {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .btn {
    font-family: 'Sakkal Majalla', Arial, sans-serif;
    font-size: 15px; font-weight: 700;
    border: none; border-radius: 10px;
    padding: 9px 20px; cursor: pointer;
    transition: all .2s; display: inline-flex; align-items: center; gap: 7px;
  }
  .btn-primary {
    background: var(--primary); color: white;
    box-shadow: 0 3px 10px rgba(26,95,168,0.25);
  }
  .btn-primary:hover { background: #1550a0; transform: translateY(-1px); }
  .btn-outline {
    background: white; color: var(--primary);
    border: 2px solid var(--primary);
  }
  .btn-outline:hover { background: var(--primary-light); }
  .lang-btn {
    background: var(--primary-light); color: var(--primary);
    border: 1.5px solid #bfdbfe; font-size: 14px; padding: 8px 16px;
  }
  .lang-btn:hover { background: #dbeafe; }

  /* ─── VIEW TOGGLE ─── */
  .view-toggle {
    display: flex; align-items: center;
    background: #f1f5f9; border-radius: 10px; padding: 4px; gap: 2px;
  }
  .view-btn {
    font-family: 'Sakkal Majalla', Arial, sans-serif;
    border: none; border-radius: 8px; padding: 7px 13px;
    cursor: pointer; font-size: 18px; background: transparent;
    color: var(--muted); transition: all .2s; line-height: 1;
  }
  .view-btn.active {
    background: white; color: var(--primary);
    box-shadow: 0 1px 6px rgba(0,0,0,0.12);
  }
  .view-btn:hover:not(.active) { color: var(--primary); }

  /* ─── MAIN ─── */
  .main { max-width: 1400px; margin: 0 auto; padding: 28px 24px; }

  /* ─── STATS BAR ─── */
  .stats-bar {
    display: flex; gap: 14px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .stat-card {
    background: white; border-radius: 12px;
    padding: 14px 22px; display: flex; align-items: center; gap: 12px;
    box-shadow: var(--shadow); flex: 1; min-width: 140px;
    border-top: 3px solid transparent;
  }
  .stat-card.all   { border-color: var(--primary); }
  .stat-card.ok    { border-color: var(--accent); }
  .stat-card.warn  { border-color: var(--warn); }
  .stat-card.bad   { border-color: var(--danger); }
  .stat-icon { font-size: 26px; }
  .stat-num  { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-lbl  { font-size: 13px; color: var(--muted); margin-top: 1px; }

  /* ─── TOOLBAR ─── */
  .toolbar {
    display: flex; gap: 12px; margin-bottom: 22px;
    align-items: center; flex-wrap: wrap;
  }
  .search-wrap {
    flex: 1; min-width: 200px; position: relative;
  }
  .search-wrap input {
    width: 100%; padding: 10px 44px 10px 16px;
    border: 2px solid var(--border); border-radius: 10px;
    font-family: 'Sakkal Majalla', Arial, sans-serif;
    font-size: 15px; background: white; color: var(--text);
    transition: border .2s; outline: none;
  }
  .search-wrap input:focus { border-color: var(--primary); }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    font-size: 17px; color: var(--muted); pointer-events: none;
  }
  .filter-select {
    font-family: 'Sakkal Majalla', Arial, sans-serif;
    font-size: 15px; padding: 10px 16px;
    border: 2px solid var(--border); border-radius: 10px;
    background: white; color: var(--text); cursor: pointer; outline: none;
    transition: border .2s;
  }
  .filter-select:focus { border-color: var(--primary); }

  /* ══════════════════════════════
     GRID VIEW (BIG CARDS)
  ══════════════════════════════ */
  #grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 20px;
  }
  .emp-card {
    background: white; border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden;
    transition: transform .2s, box-shadow .2s;
    border: 1.5px solid var(--border);
    position: relative;
  }
  .emp-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(26,95,168,0.13);
  }
  .card-top {
    padding: 20px 20px 14px;
    display: flex; align-items: flex-start; gap: 14px;
  }
  .avatar {
    width: 52px; height: 52px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 700; color: white;
    flex-shrink: 0;
  }
  .card-info { flex: 1; }
  .card-name {
    font-size: 18px; font-weight: 700; color: var(--text); line-height: 1.3;
  }
  .card-job-num {
    font-size: 13px; color: var(--muted); margin-top: 2px;
  }
  .card-id {
    font-size: 13px; color: var(--muted);
  }
  .status-badge {
    padding: 5px 12px; border-radius: 20px;
    font-size: 13px; font-weight: 700;
    display: inline-flex; align-items: center; gap: 5px;
    white-space: nowrap;
  }
  .badge-ok   { background: #dcfce7; color: #15803d; }
  .badge-warn { background: #fef9c3; color: #92400e; }
  .badge-bad  { background: #fee2e2; color: #b91c1c; }

  .card-divider { height: 1px; background: var(--border); margin: 0 20px; }

  .card-body { padding: 14px 20px; }
  .date-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .date-label { font-size: 14px; color: var(--muted); }
  .date-value { font-size: 15px; font-weight: 700; }

  .progress-wrap {
    background: #e2e8f0; border-radius: 99px;
    height: 8px; overflow: hidden; margin-bottom: 8px;
  }
  .progress-bar {
    height: 100%; border-radius: 99px;
    transition: width .6s ease;
  }
  .days-left { font-size: 13px; color: var(--muted); text-align: left; }

  .card-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end;
  }
  .btn-sm {
    font-family: 'Sakkal Majalla', Arial, sans-serif;
    font-size: 14px; padding: 7px 15px; border-radius: 8px;
    border: none; cursor: pointer; transition: all .2s; font-weight: 700;
  }
  .btn-edit   { background: var(--primary-light); color: var(--primary); }
  .btn-edit:hover { background: #bfdbfe; }
  .btn-delete { background: #fee2e2; color: var(--danger); }
  .btn-delete:hover { background: #fecaca; }

  /* ══════════════════════════════
     LIST VIEW (HORIZONTAL ROWS)
  ══════════════════════════════ */
  #list-container { display: flex; flex-direction: column; gap: 0; }

  .list-header {
    display: grid;
    grid-template-columns: 48px 1fr 130px 130px 140px 160px 120px;
    gap: 0;
    background: var(--primary);
    border-radius: 12px 12px 0 0;
    overflow: hidden;
    padding: 0;
  }
  .list-header-cell {
    padding: 13px 14px;
    font-size: 14px; font-weight: 700; color: white;
    display: flex; align-items: center;
    border-left: 1px solid rgba(255,255,255,0.15);
  }
  .list-header-cell:last-child { border-left: none; }

  .list-row {
    display: grid;
    grid-template-columns: 48px 1fr 130px 130px 140px 160px 120px;
    gap: 0;
    background: white;
    border: 1px solid var(--border);
    border-top: none;
    transition: background .15s;
    align-items: center;
  }
  .list-row:last-child { border-radius: 0 0 12px 12px; }
  .list-row:hover { background: #f8fafc; }
  .list-row.row-warn { background: var(--warn-light); }
  .list-row.row-bad  { background: var(--danger-light); }

  .list-cell {
    padding: 13px 14px;
    font-size: 15px; color: var(--text);
    border-left: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .list-cell:last-child { border-left: none; }
  .list-cell .cell-muted { font-size: 12px; color: var(--muted); }

  .list-avatar {
    width: 34px; height: 34px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: white;
    flex-shrink: 0;
  }
  .list-name-block { display: flex; flex-direction: column; gap: 1px; }
  .list-name       { font-size: 15px; font-weight: 700; color: var(--text); }
  .list-sub        { font-size: 12px; color: var(--muted); }

  .list-progress {
    width: 100%; background: #e2e8f0; border-radius: 99px; height: 6px; overflow: hidden;
  }
  .list-progress-bar { height: 100%; border-radius: 99px; }

  /* ─── ALERT PULSE ─── */
  @keyframes pulse-red  { 0%,100%{opacity:1} 50%{opacity:.5} }
  @keyframes pulse-warn { 0%,100%{opacity:1} 50%{opacity:.6} }
  .pulse-red  { animation: pulse-red  1.4s ease-in-out infinite; }
  .pulse-warn { animation: pulse-warn 2s   ease-in-out infinite; }

  /* ─── MODAL ─── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(15,23,42,0.45); z-index: 1000;
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white; border-radius: 18px;
    width: 100%; max-width: 540px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    overflow: hidden;
  }
  .modal-header {
    background: var(--primary); padding: 20px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-size: 19px; font-weight: 700; color: white; }
  .modal-close {
    background: rgba(255,255,255,0.2); border: none;
    color: white; width: 32px; height: 32px; border-radius: 8px;
    font-size: 18px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: background .2s;
  }
  .modal-close:hover { background: rgba(255,255,255,0.35); }
  .modal-body { padding: 24px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-label { font-size: 14px; font-weight: 700; color: var(--text); }
  .form-input {
    font-family: 'Sakkal Majalla', Arial, sans-serif;
    font-size: 15px; padding: 10px 14px;
    border: 2px solid var(--border); border-radius: 10px;
    color: var(--text); outline: none; transition: border .2s;
    background: #f8fafc;
  }
  .form-input:focus { border-color: var(--primary); background: white; }
  .modal-footer {
    padding: 16px 24px; border-top: 1px solid var(--border);
    display: flex; gap: 10px; justify-content: flex-end;
  }
  .btn-cancel {
    background: #f1f5f9; color: var(--muted);
    border: none; border-radius: 10px; padding: 10px 22px;
    font-family: 'Sakkal Majalla', Arial, sans-serif;
    font-size: 15px; font-weight: 700; cursor: pointer;
    transition: background .2s;
  }
  .btn-cancel:hover { background: #e2e8f0; }

  /* ─── EMPTY ─── */
  .empty {
    text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .empty-icon { font-size: 54px; margin-bottom: 12px; }
  .empty-text { font-size: 18px; }

  /* ─── NOTIFICATION ─── */
  .notif {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #1e293b; color: white; padding: 13px 28px;
    border-radius: 12px; font-size: 16px; font-weight: 700;
    box-shadow: 0 8px 28px rgba(0,0,0,0.25); z-index: 9999;
    transition: transform .35s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
  }
  .notif.show { transform: translateX(-50%) translateY(0); }

  /* ─── RESPONSIVE ─── */
  @media(max-width: 900px) {
    .list-header, .list-row {
      grid-template-columns: 38px 1fr 110px 120px 130px;
    }
    .list-header-cell:nth-child(4),
    .list-cell:nth-child(4),
    .list-header-cell:nth-child(7),
    .list-cell:nth-child(7) { display: none; }
  }
  @media(max-width: 640px) {
    .header { padding: 12px 16px; }
    .main   { padding: 16px 12px; }
    .list-header, .list-row { grid-template-columns: 36px 1fr 100px 120px; }
    .list-header-cell:nth-child(5),
    .list-cell:nth-child(5) { display: none; }
    .form-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header class="header">
  <div class="header-logo">
    <div class="logo-circle">ص</div>
    <div>
      <div class="logo-text-ar" id="hdr-company">سجل متابعة موظفين ساجا الصيادلة</div>
      <div class="logo-text-en" id="hdr-company-en">SAJA PHARMACISTS — EMPLOYEE TRACKING RECORD</div>
    </div>
  </div>
  <div class="header-controls">
    <!-- View Toggle -->
    <div class="view-toggle" title="طريقة العرض">
      <button class="view-btn" id="btn-grid" onclick="setView('grid')" title="عرض بطاقات كبيرة">⊞</button>
      <button class="view-btn active" id="btn-list" onclick="setView('list')" title="عرض قائمة أفقية">☰</button>
    </div>
    <button class="btn lang-btn" onclick="toggleLang()" id="lang-btn">🌐 English</button>
    <button class="btn btn-primary" onclick="openModal()">
      <span>＋</span> <span id="btn-add-lbl">إضافة موظف</span>
    </button>
  </div>
</header>

<!-- ═══ MAIN ═══ -->
<main class="main">

  <!-- Stats -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat-card all">
      <div class="stat-icon">👥</div>
      <div><div class="stat-num" id="s-all">0</div><div class="stat-lbl" id="s-all-lbl">إجمالي الموظفين</div></div>
    </div>
    <div class="stat-card ok">
      <div class="stat-icon">✅</div>
      <div><div class="stat-num" id="s-ok">0</div><div class="stat-lbl" id="s-ok-lbl">بطاقات صالحة</div></div>
    </div>
    <div class="stat-card warn">
      <div class="stat-icon">⚠️</div>
      <div><div class="stat-num" id="s-warn">0</div><div class="stat-lbl" id="s-warn-lbl">قريبة الانتهاء</div></div>
    </div>
    <div class="stat-card bad">
      <div class="stat-icon">🚨</div>
      <div><div class="stat-num" id="s-bad">0</div><div class="stat-lbl" id="s-bad-lbl">منتهية الصلاحية</div></div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="ابحث باسم الموظف أو رقمه..." oninput="renderAll()"/>
    </div>
    <select class="filter-select" id="filter-select" onchange="renderAll()">
      <option value="all"  id="f-all">الكل</option>
      <option value="ok"   id="f-ok">صالحة</option>
      <option value="warn" id="f-warn">قريبة الانتهاء</option>
      <option value="bad"  id="f-bad">منتهية</option>
    </select>
  </div>

  <!-- GRID VIEW -->
  <div id="grid-container" style="display:none;"></div>

  <!-- LIST VIEW -->
  <div id="list-container" style="display:block;"></div>

</main>

<!-- ═══ MODAL ═══ -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">إضافة موظف جديد</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group full">
          <label class="form-label" id="lbl-name">اسم الموظف</label>
          <input class="form-input" id="f-name" placeholder="أدخل الاسم الكامل..."/>
        </div>
        <div class="form-group">
          <label class="form-label" id="lbl-natid">رقم الهوية</label>
          <input class="form-input" id="f-natid" placeholder="10xxxxxxxx"/>
        </div>
        <div class="form-group">
          <label class="form-label" id="lbl-jobid">الرقم الوظيفي</label>
          <input class="form-input" id="f-jobid" placeholder="EMP-xxxx"/>
        </div>
        <div class="form-group full">
          <label class="form-label" id="lbl-exp">تاريخ انتهاء البطاقة</label>
          <input class="form-input" id="f-exp" type="date"/>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()" id="btn-cancel-lbl">إلغاء</button>
      <button class="btn btn-primary" onclick="saveEmployee()" id="btn-save-lbl">💾 حفظ</button>
    </div>
  </div>
</div>

<!-- ═══ NOTIFICATION ═══ -->
<div class="notif" id="notif"></div>

<script>
/* ─── DATA ─── */
let employees = JSON.parse(localStorage.getItem('saja_emps') || '[]');
let editId    = null;
let lang      = 'ar';
let viewMode  = 'list'; // 'grid' | 'list'

const DEMO = [
  { id: uid(), name: 'أحمد محمد السالم',   natid: '1023456789', jobid: 'EMP-1001', exp: offset(400) },
  { id: uid(), name: 'فاطمة علي الزهراني', natid: '1098765432', jobid: 'EMP-1002', exp: offset(50)  },
  { id: uid(), name: 'خالد عبدالله الغامدي',natid: '1056781234', jobid: 'EMP-1003', exp: offset(30)  },
  { id: uid(), name: 'نورة سعد القحطاني',  natid: '1034562987', jobid: 'EMP-1004', exp: offset(-10) },
  { id: uid(), name: 'سلطان ناصر الدوسري', natid: '1078903456', jobid: 'EMP-1005', exp: offset(200) },
  { id: uid(), name: 'ريم يوسف المالكي',   natid: '1065432178', jobid: 'EMP-1006', exp: offset(15)  },
];
if (!employees.length) { employees = DEMO; save(); }

function uid()       { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function offset(d)   { const dt=new Date(); dt.setDate(dt.getDate()+d); return dt.toISOString().slice(0,10); }
function save()      { localStorage.setItem('saja_emps', JSON.stringify(employees)); }

/* ─── STATUS ─── */
function getStatus(exp) {
  const today = new Date(); today.setHours(0,0,0,0);
  const end   = new Date(exp);
  const days  = Math.round((end - today) / 86400000);
  if (days < 0)   return { type:'bad',  days, label: lang==='ar'?'منتهية':'Expired', icon:'🚨' };
  if (days <= 60) return { type:'warn', days, label: lang==='ar'?'قريبة الانتهاء':'Expiring Soon', icon:'⚠️' };
  return              { type:'ok',   days, label: lang==='ar'?'صالحة':'Valid', icon:'✅' };
}
function daysLabel(d) {
  if (d < 0) return lang==='ar' ? `منذ ${Math.abs(d)} يوم` : `${Math.abs(d)}d ago`;
  return lang==='ar' ? `متبقٍ ${d} يوم` : `${d}d left`;
}
function progressPct(exp) {
  const start = new Date(exp); start.setFullYear(start.getFullYear()-1);
  const end   = new Date(exp);
  const now   = new Date();
  const pct   = ((now - start) / (end - start)) * 100;
  return Math.min(100, Math.max(0, pct));
}
function progressColor(type) {
  return type==='ok' ? '#0e9e6e' : type==='warn' ? '#d97706' : '#e53e3e';
}
function avatarColor(i) {
  const cs = ['#1a5fa8','#0e9e6e','#d97706','#7c3aed','#e53e3e','#0891b2','#be185d'];
  return cs[i % cs.length];
}
function initials(name) {
  return name.trim().split(' ').slice(0,2).map(w=>w[0]).join('');
}

/* ─── VIEW MODE ─── */
function setView(mode) {
  viewMode = mode;
  document.getElementById('btn-grid').classList.toggle('active', mode==='grid');
  document.getElementById('btn-list').classList.toggle('active', mode==='list');
  renderAll();
}

/* ─── FILTER ─── */
function filtered() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const f = document.getElementById('filter-select').value;
  return employees.filter(e => {
    const matchQ = !q || e.name.toLowerCase().includes(q) || e.jobid.toLowerCase().includes(q) || e.natid.includes(q);
    const s = getStatus(e.exp).type;
    const matchF = f==='all' || s===f;
    return matchQ && matchF;
  });
}

/* ─── RENDER ALL ─── */
function renderAll() {
  updateStats();
  if (viewMode === 'grid') {
    document.getElementById('grid-container').style.display = 'grid';
    document.getElementById('list-container').style.display = 'none';
    renderGrid();
  } else {
    document.getElementById('grid-container').style.display = 'none';
    document.getElementById('list-container').style.display = 'block';
    renderList();
  }
}

/* ─── GRID RENDER ─── */
function renderGrid() {
  const list = filtered();
  const c    = document.getElementById('grid-container');
  if (!list.length) { c.innerHTML = emptyHTML(); return; }
  c.innerHTML = list.map((e,i) => {
    const s   = getStatus(e.exp);
    const pct = progressPct(e.exp);
    const ac  = avatarColor(employees.indexOf(e));
    const badgeClass = s.type==='ok'?'badge-ok':s.type==='warn'?'badge-warn':'badge-bad';
    const pulseClass = s.type==='bad'?'pulse-red':s.type==='warn'?'pulse-warn':'';
    return `
    <div class="emp-card">
      <div class="card-top">
        <div class="avatar" style="background:${ac}">${initials(e.name)}</div>
        <div class="card-info">
          <div class="card-name">${e.name}</div>
          <div class="card-job-num">${lang==='ar'?'الرقم الوظيفي':'Job No.'}: ${e.jobid}</div>
          <div class="card-id">${lang==='ar'?'الهوية':'ID'}: ${e.natid}</div>
        </div>
        <div class="status-badge ${badgeClass} ${pulseClass}" style="margin-top:2px">
          ${s.icon} ${s.label}
        </div>
      </div>
      <div class="card-divider"></div>
      <div class="card-body">
        <div class="date-row">
          <span class="date-label">${lang==='ar'?'تاريخ الانتهاء':'Expiry Date'}</span>
          <span class="date-value" style="color:${progressColor(s.type)}">${formatDate(e.exp)}</span>
        </div>
        <div class="progress-wrap">
          <div class="progress-bar" style="width:${pct}%;background:${progressColor(s.type)}"></div>
        </div>
        <div class="days-left ${pulseClass}" style="color:${progressColor(s.type)};font-weight:700">
          ${s.icon} ${daysLabel(s.days)}
        </div>
      </div>
      <div class="card-footer">
        <button class="btn-sm btn-edit"   onclick="openModal('${e.id}')">${lang==='ar'?'✏️ تعديل':'✏️ Edit'}</button>
        <button class="btn-sm btn-delete" onclick="deleteEmp('${e.id}')">${lang==='ar'?'🗑 حذف':'🗑 Delete'}</button>
      </div>
    </div>`;
  }).join('');
}

/* ─── LIST RENDER ─── */
function renderList() {
  const list = filtered();
  const c    = document.getElementById('list-container');
  if (!list.length) { c.innerHTML = emptyHTML(); return; }

  const T = lang==='ar';
  const header = `
  <div class="list-header">
    <div class="list-header-cell">#</div>
    <div class="list-header-cell">${T?'الموظف':'Employee'}</div>
    <div class="list-header-cell">${T?'رقم الهوية':'National ID'}</div>
    <div class="list-header-cell">${T?'الرقم الوظيفي':'Job No.'}</div>
    <div class="list-header-cell">${T?'تاريخ الانتهاء':'Expiry Date'}</div>
    <div class="list-header-cell">${T?'نسبة الصلاحية':'Badge Progress'}</div>
    <div class="list-header-cell">${T?'الإجراء':'Actions'}</div>
  </div>`;

  const rows = list.map((e, i) => {
    const s   = getStatus(e.exp);
    const pct = progressPct(e.exp);
    const ac  = avatarColor(employees.indexOf(e));
    const badgeClass = s.type==='ok'?'badge-ok':s.type==='warn'?'badge-warn':'badge-bad';
    const pulseClass = s.type==='bad'?'pulse-red':s.type==='warn'?'pulse-warn':'';
    const rowClass   = s.type==='warn'?'row-warn':s.type==='bad'?'row-bad':'';
    return `
    <div class="list-row ${rowClass}">
      <div class="list-cell" style="justify-content:center">
        <div class="list-avatar" style="background:${ac}">${initials(e.name)}</div>
      </div>
      <div class="list-cell">
        <div class="list-name-block">
          <span class="list-name">${e.name}</span>
          <span class="status-badge ${badgeClass} ${pulseClass}" style="margin-top:4px;font-size:12px">
            ${s.icon} ${s.label}
          </span>
        </div>
      </div>
      <div class="list-cell">
        <span>${e.natid}</span>
      </div>
      <div class="list-cell">
        <span>${e.jobid}</span>
      </div>
      <div class="list-cell">
        <div>
          <div style="font-weight:700;color:${progressColor(s.type)}">${formatDate(e.exp)}</div>
          <div class="cell-muted ${pulseClass}" style="color:${progressColor(s.type)}">${daysLabel(s.days)}</div>
        </div>
      </div>
      <div class="list-cell">
        <div style="width:100%">
          <div class="list-progress">
            <div class="list-progress-bar" style="width:${pct}%;background:${progressColor(s.type)}"></div>
          </div>
          <div style="font-size:12px;color:${progressColor(s.type)};margin-top:4px;font-weight:700">${Math.round(pct)}%</div>
        </div>
      </div>
      <div class="list-cell">
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn-sm btn-edit"   onclick="openModal('${e.id}')">${T?'✏️':'✏️'}</button>
          <button class="btn-sm btn-delete" onclick="deleteEmp('${e.id}')">${T?'🗑':'🗑'}</button>
        </div>
      </div>
    </div>`;
  }).join('');

  c.innerHTML = header + rows;
}

/* ─── HELPERS ─── */
function emptyHTML() {
  return `<div class="empty">
    <div class="empty-icon">📋</div>
    <div class="empty-text">${lang==='ar'?'لا توجد نتائج':'No results found'}</div>
  </div>`;
}
function formatDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return lang==='ar' ? `${day}/${m}/${y}` : `${day}/${m}/${y}`;
}
function updateStats() {
  const all  = employees.length;
  const ok   = employees.filter(e=>getStatus(e.exp).type==='ok').length;
  const warn = employees.filter(e=>getStatus(e.exp).type==='warn').length;
  const bad  = employees.filter(e=>getStatus(e.exp).type==='bad').length;
  document.getElementById('s-all').textContent  = all;
  document.getElementById('s-ok').textContent   = ok;
  document.getElementById('s-warn').textContent = warn;
  document.getElementById('s-bad').textContent  = bad;
}

/* ─── MODAL ─── */
function openModal(id=null) {
  editId = id;
  const T = lang==='ar';
  document.getElementById('modal-title').textContent = id ? (T?'تعديل بيانات الموظف':'Edit Employee') : (T?'إضافة موظف جديد':'Add New Employee');
  document.getElementById('btn-save-lbl').innerHTML = id ? (T?'💾 تحديث':'💾 Update') : (T?'💾 حفظ':'💾 Save');
  if (id) {
    const e = employees.find(x=>x.id===id);
    document.getElementById('f-name').value  = e.name;
    document.getElementById('f-natid').value = e.natid;
    document.getElementById('f-jobid').value = e.jobid;
    document.getElementById('f-exp').value   = e.exp;
  } else {
    document.getElementById('f-name').value  = '';
    document.getElementById('f-natid').value = '';
    document.getElementById('f-jobid').value = '';
    document.getElementById('f-exp').value   = '';
  }
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function saveEmployee() {
  const name  = document.getElementById('f-name').value.trim();
  const natid = document.getElementById('f-natid').value.trim();
  const jobid = document.getElementById('f-jobid').value.trim();
  const exp   = document.getElementById('f-exp').value;
  if (!name||!natid||!jobid||!exp) {
    showNotif(lang==='ar'?'⚠️ يرجى ملء جميع الحقول':'⚠️ Please fill all fields'); return;
  }
  if (editId) {
    const i = employees.findIndex(e=>e.id===editId);
    employees[i] = { ...employees[i], name, natid, jobid, exp };
    showNotif(lang==='ar'?'✅ تم التحديث بنجاح':'✅ Updated successfully');
  } else {
    employees.push({ id: uid(), name, natid, jobid, exp });
    showNotif(lang==='ar'?'✅ تمت الإضافة بنجاح':'✅ Employee added');
  }
  save(); closeModal(); renderAll();
}
function deleteEmp(id) {
  if (!confirm(lang==='ar'?'هل تريد حذف هذا الموظف؟':'Delete this employee?')) return;
  employees = employees.filter(e=>e.id!==id);
  save(); renderAll();
  showNotif(lang==='ar'?'🗑 تم الحذف':'🗑 Deleted');
}

/* ─── NOTIFICATION ─── */
function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg; n.classList.add('show');
  setTimeout(()=>n.classList.remove('show'), 2800);
}

/* ─── LANGUAGE ─── */
const TR = {
  ar: {
    company:'سجل متابعة موظفين ساجا الصيادلة',
    addBtn:'إضافة موظف', langBtn:'🌐 English',
    sAll:'إجمالي الموظفين', sOk:'بطاقات صالحة', sWarn:'قريبة الانتهاء', sBad:'منتهية الصلاحية',
    search:'ابحث باسم الموظف أو رقمه...', fAll:'الكل', fOk:'صالحة', fWarn:'قريبة الانتهاء', fBad:'منتهية',
    dir:'rtl', htmlLang:'ar'
  },
  en: {
    company:'SAJA PHARMACISTS — EMPLOYEE TRACKING RECORD',
    addBtn:'Add Employee', langBtn:'🌐 عربي',
    sAll:'Total Employees', sOk:'Valid Badges', sWarn:'Expiring Soon', sBad:'Expired',
    search:'Search by name, job no. or ID...', fAll:'All', fOk:'Valid', fWarn:'Expiring', fBad:'Expired',
    dir:'ltr', htmlLang:'en'
  }
};
function toggleLang() {
  lang = lang==='ar'?'en':'ar';
  const T = TR[lang];
  document.documentElement.lang = T.htmlLang;
  document.documentElement.dir  = T.dir;
  document.getElementById('hdr-company').textContent    = T.company;
  document.getElementById('btn-add-lbl').textContent    = T.addBtn;
  document.getElementById('lang-btn').textContent       = T.langBtn;
  document.getElementById('s-all-lbl').textContent      = T.sAll;
  document.getElementById('s-ok-lbl').textContent       = T.sOk;
  document.getElementById('s-warn-lbl').textContent     = T.sWarn;
  document.getElementById('s-bad-lbl').textContent      = T.sBad;
  document.getElementById('search-input').placeholder   = T.search;
  document.getElementById('f-all').textContent          = T.fAll;
  document.getElementById('f-ok').textContent           = T.fOk;
  document.getElementById('f-warn').textContent         = T.fWarn;
  document.getElementById('f-bad').textContent          = T.fBad;
  // form labels
  document.getElementById('lbl-name').textContent  = lang==='ar'?'اسم الموظف':'Employee Name';
  document.getElementById('lbl-natid').textContent = lang==='ar'?'رقم الهوية':'National ID';
  document.getElementById('lbl-jobid').textContent = lang==='ar'?'الرقم الوظيفي':'Job Number';
  document.getElementById('lbl-exp').textContent   = lang==='ar'?'تاريخ انتهاء البطاقة':'Card Expiry Date';
  document.getElementById('btn-cancel-lbl').textContent = lang==='ar'?'إلغاء':'Cancel';
  renderAll();
}

/* ─── CLOSE MODAL ON OVERLAY CLICK ─── */
document.getElementById('modal').addEventListener('click', function(e){
  if(e.target===this) closeModal();
});

/* ─── INIT ─── */
renderAll();
</script>
</body>
</html>
