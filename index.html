<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

function getStatus(expiry) {
  const now = new Date(); now.setHours(0,0,0,0);
  const exp = new Date(expiry); exp.setHours(0,0,0,0);
  const diff = Math.ceil((exp - now) / (1000*60*60*24));
  if (diff < 0) return { key: "expired", label: "منتهية", days: diff };
  if (diff <= 60) return { key: "soon", label: "قريبة الانتهاء", days: diff };
  return { key: "valid", label: "صالحة", days: diff };
}

function getProgress(expiry) {
  const now = new Date(); now.setHours(0,0,0,0);
  const exp = new Date(expiry); exp.setHours(0,0,0,0);
  const diff = Math.ceil((exp - now) / (1000*60*60*24));
  if (diff < 0) return 0;
  return Math.min(100, Math.round((diff / 365) * 100));
}

function formatDate(d) {
  if (!d) return "—";
  const [y,m,day] = d.split("-");
  const months = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
}

function getInitials(name) {
  const parts = name.trim().split(" ");
  return parts.length >= 2 ? parts[0][0] + parts[1][0] : parts[0].slice(0,2);
}

// ---- Firebase helpers ----
async function fbAdd(data) {
  const { db, collection, addDoc } = window.__firebase;
  const ref = await addDoc(collection(db, "employees"), data);
  return ref.id;
}
async function fbUpdate(id, data) {
  const { db, doc, updateDoc } = window.__firebase;
  await updateDoc(doc(db, "employees", id), data);
}
async function fbDelete(id) {
  const { db, doc, deleteDoc } = window.__firebase;
  await deleteDoc(doc(db, "employees", id));
}
function fbListen(callback) {
  const { db, collection, onSnapshot } = window.__firebase;
  return onSnapshot(collection(db, "employees"), (snap) => {
    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    callback(data);
  });
}

// ---- Components ----
function Modal({ onClose, onSave, initial, saving }) {
  const [form, setForm] = useState(initial || { name:"", idNumber:"", empId:"", expiry:"" });
  const set = (k, v) => setForm(f => ({...f, [k]: v}));
  const valid = form.name && form.idNumber && form.empId && form.expiry;
  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-title">
          <span style={{fontSize:22}}>💊</span>
          {initial ? "تعديل بيانات الموظف" : "إضافة موظف جديد"}
        </div>
        <div className="form-group">
          <label className="form-label">الاسم الكامل</label>
          <input className="form-input" placeholder="أدخل اسم الموظف" value={form.name} onChange={e=>set("name",e.target.value)} />
        </div>
        <div className="form-group">
          <label className="form-label">رقم الهوية</label>
          <input className="form-input" placeholder="10 أرقام" value={form.idNumber} onChange={e=>set("idNumber",e.target.value)} />
        </div>
        <div className="form-group">
          <label className="form-label">الرقم الوظيفي</label>
          <input className="form-input" placeholder="مثال: PH-007" value={form.empId} onChange={e=>set("empId",e.target.value)} />
        </div>
        <div className="form-group">
          <label className="form-label">تاريخ انتهاء الرخصة</label>
          <input className="form-input" type="date" value={form.expiry} onChange={e=>set("expiry",e.target.value)} />
        </div>
        <div className="modal-actions">
          <button className="btn btn-primary" style={{flex:1}} disabled={!valid||saving} onClick={()=>valid&&!saving&&onSave(form)}>
            {saving ? "جاري الحفظ..." : initial ? "حفظ التعديلات" : "إضافة الموظف"}
          </button>
          <button className="btn btn-ghost" onClick={onClose} disabled={saving}>إلغاء</button>
        </div>
      </div>
    </div>
  );
}

function StatCard({ icon, value, label, color }) {
  const colors = {
    green:{bg:"#d1fae5",text:"#059669"},
    orange:{bg:"#fef3c7",text:"#d97706"},
    red:{bg:"#fee2e2",text:"#dc2626"},
    blue:{bg:"#dbeafe",text:"#2563eb"},
  };
  const c = colors[color]||colors.blue;
  return (
    <div className="stat-card">
      <div className="stat-icon" style={{background:c.bg,color:c.text}}>{icon}</div>
      <div className="stat-info">
        <div className="stat-value" style={{color:c.text}}>{value}</div>
        <div className="stat-label">{label}</div>
      </div>
    </div>
  );
}

function TableRow({ emp, onEdit, onDelete }) {
  const st = getStatus(emp.expiry);
  const prog = getProgress(emp.expiry);
  const badgeClass = `badge-${st.key}`;
  const progClass = `progress-${st.key}`;
  return (
    <tr>
      <td>
        <div className="employee-name">{emp.name}</div>
        <div className="employee-id">{emp.empId}</div>
      </td>
      <td>{emp.idNumber}</td>
      <td>{formatDate(emp.expiry)}</td>
      <td><span className={`badge ${badgeClass}`}>{st.label}</span></td>
      <td>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div className="progress-bar" style={{flex:1}}>
            <div className={`progress-fill ${progClass}`} style={{width:`${prog}%`}}/>
          </div>
          <span style={{fontSize:11,color:"#6b7280",whiteSpace:"nowrap",minWidth:40}}>
            {st.days < 0 ? `${Math.abs(st.days)}ي` : `${st.days}ي`}
          </span>
        </div>
      </td>
      <td>
        <button className="action-btn action-edit" title="تعديل" onClick={()=>onEdit(emp)}>✏️</button>
        <button className="action-btn action-delete" title="حذف" onClick={()=>onDelete(emp.id)}>🗑</button>
      </td>
    </tr>
  );
}

function EmployeeCard({ emp, onEdit, onDelete }) {
  const st = getStatus(emp.expiry);
  const prog = getProgress(emp.expiry);
  return (
    <div className="employee-card">
      <div className={`card-accent card-accent-${st.key}`}/>
      <div className="card-header">
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div className={`card-avatar avatar-${st.key}`}>{getInitials(emp.name)}</div>
          <div>
            <div className="card-name">{emp.name}</div>
            <span className={`badge badge-${st.key}`} style={{marginTop:4}}>{st.label}</span>
          </div>
        </div>
        <span style={{fontSize:11,color:"#6b7280",background:"#f3f4f6",padding:"2px 8px",borderRadius:20,fontWeight:600}}>{emp.empId}</span>
      </div>
      <div className="card-ids">
        <div className="card-id-item">
          <div className="card-id-label">رقم الهوية</div>
          <div className="card-id-value">{emp.idNumber}</div>
        </div>
        <div className="card-id-item">
          <div className="card-id-label">الأيام المتبقية</div>
          <div className="card-id-value" style={{color:st.key==="valid"?"var(--green-dark)":st.key==="soon"?"var(--orange-dark)":"var(--red-dark)"}}>
            {st.days < 0 ? `منذ ${Math.abs(st.days)} يوم` : `${st.days} يوم`}
          </div>
        </div>
      </div>
      <div className="card-expiry">
        <div className="card-expiry-label">📅 تاريخ انتهاء الرخصة</div>
        <div className="card-expiry-date">{formatDate(emp.expiry)}</div>
        <div className="progress-bar">
          <div className={`progress-fill progress-${st.key}`} style={{width:`${prog}%`}}/>
        </div>
      </div>
      <div className="card-actions">
        <button className="card-action-btn card-edit" onClick={()=>onEdit(emp)}>✏️ تعديل</button>
        <button className="card-action-btn card-delete" onClick={()=>onDelete(emp.id)}>🗑 حذف</button>
      </div>
    </div>
  );
}

function App() {
  const [firebaseReady, setFirebaseReady] = useState(!!window.__firebase);
  const [employees, setEmployees] = useState([]);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState("table");
  const [search, setSearch] = useState("");
  const [filter, setFilter] = useState("all");
  const [modal, setModal] = useState(null);
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    if (!firebaseReady) {
      const handler = () => setFirebaseReady(true);
      window.addEventListener("firebase-ready", handler);
      return () => window.removeEventListener("firebase-ready", handler);
    }
  }, [firebaseReady]);

  useEffect(() => {
    if (!firebaseReady) return;
    setLoading(true);
    const unsub = fbListen((data) => {
      setEmployees(data);
      setLoading(false);
    });
    return () => unsub();
  }, [firebaseReady]);

  const stats = useMemo(() => ({
    total: employees.length,
    valid: employees.filter(e => getStatus(e.expiry).key === "valid").length,
    soon: employees.filter(e => getStatus(e.expiry).key === "soon").length,
    expired: employees.filter(e => getStatus(e.expiry).key === "expired").length,
  }), [employees]);

  const filtered = useMemo(() => employees.filter(e => {
    const q = search.toLowerCase();
    const matchSearch = !q || e.name.toLowerCase().includes(q) || e.idNumber.includes(q) || e.empId.toLowerCase().includes(q);
    const matchFilter = filter === "all" || getStatus(e.expiry).key === filter;
    return matchSearch && matchFilter;
  }), [employees, search, filter]);

  const handleSave = async (form) => {
    setSaving(true);
    try {
      if (modal && modal.id) {
        await fbUpdate(modal.id, form);
      } else {
        await fbAdd(form);
      }
      setModal(null);
    } catch(e) {
      alert("حدث خطأ: " + e.message);
    }
    setSaving(false);
  };

  const handleDelete = async (id) => {
    if (confirm("هل أنت متأكد من حذف هذا الموظف؟")) {
      await fbDelete(id);
    }
  };

  const filterTabs = [
    { key:"all", label:`الكل (${stats.total})`, active:"active-all" },
    { key:"valid", label:`صالحة (${stats.valid})`, active:"active-valid" },
    { key:"soon", label:`قريبة الانتهاء (${stats.soon})`, active:"active-soon" },
    { key:"expired", label:`منتهية (${stats.expired})`, active:"active-expired" },
  ];

  if (!firebaseReady || loading) {
    return (
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:12,color:"#6b7280"}}>
        <div className="loading-spinner"/>
        <div style={{fontSize:14}}>جاري الاتصال بقاعدة البيانات...</div>
      </div>
    );
  }

  return (
    <div className="app">
      <header className="header">
        <div className="logo">
          <div className="logo-icon">💊</div>
          <div>
            <div className="logo-text">ساجا الصيادلة</div>
            <div className="logo-sub">نظام متابعة رخص الموظفين</div>
          </div>
        </div>
        <div className="header-actions">
          <span className="firebase-badge">🔥 متصل بـ Firebase</span>
          <button className="btn btn-primary" onClick={()=>setModal("add")}>
            <span style={{fontSize:16,fontWeight:700}}>+</span> إضافة موظف
          </button>
        </div>
      </header>

      <main className="main">
        <div className="stats-grid">
          <StatCard icon="👥" value={stats.total} label="إجمالي الموظفين" color="blue"/>
          <StatCard icon="✅" value={stats.valid} label="رخص صالحة" color="green"/>
          <StatCard icon="⚠️" value={stats.soon} label="قريبة الانتهاء" color="orange"/>
          <StatCard icon="❌" value={stats.expired} label="رخص منتهية" color="red"/>
        </div>

        <div className="toolbar">
          <div className="search-wrap">
            <span className="search-icon">🔍</span>
            <input placeholder="بحث بالاسم أو رقم الهوية أو الرقم الوظيفي..." value={search} onChange={e=>setSearch(e.target.value)} />
          </div>
          <div className="view-toggle">
            <button className={`view-btn${view==="table"?" active":""}`} onClick={()=>setView("table")} title="عرض الجدول">☰</button>
            <button className={`view-btn${view==="grid"?" active":""}`} onClick={()=>setView("grid")} title="عرض البطاقات">⊞</button>
          </div>
        </div>

        <div className="filter-tabs">
          {filterTabs.map(t => (
            <button key={t.key} className={`filter-tab ${filter===t.key ? t.active : ""}`} onClick={()=>setFilter(t.key)}>{t.label}</button>
          ))}
        </div>

        {filtered.length === 0 ? (
          <div className="empty-state">
            <div className="empty-icon">{employees.length === 0 ? "💊" : "🔍"}</div>
            <div className="empty-text">{employees.length === 0 ? "لا يوجد موظفون بعد" : "لا توجد نتائج"}</div>
            <div className="empty-sub">{employees.length === 0 ? "اضغط إضافة موظف للبدء" : "جرب تغيير كلمة البحث أو الفلتر"}</div>
          </div>
        ) : view === "table" ? (
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>الموظف</th>
                  <th>رقم الهوية</th>
                  <th>تاريخ الانتهاء</th>
                  <th>الحالة</th>
                  <th>المدة المتبقية</th>
                  <th>إجراءات</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(e => <TableRow key={e.id} emp={e} onEdit={setModal} onDelete={handleDelete}/>)}
              </tbody>
            </table>
          </div>
        ) : (
          <div className="grid-view">
            {filtered.map(e => <EmployeeCard key={e.id} emp={e} onEdit={setModal} onDelete={handleDelete}/>)}
          </div>
        )}
      </main>

      {(modal === "add" || (modal && modal.id)) && (
        <Modal onClose={()=>!saving&&setModal(null)} onSave={handleSave} initial={modal !== "add" ? modal : null} saving={saving}/>
      )}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
